AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: EventAlbum - Serverless Event Media Platform

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures: [arm64]
    MemorySize: 128
    Timeout: 10
    Layers:
      - !Ref SharedUtilsLayer
    Environment:
      Variables:
        TABLE_NAME: !Sub EventAlbum-${Environment}
        MEDIA_BUCKET: !Sub eventalbum-media-${Environment}
        CLOUDFRONT_DOMAIN: !If
          - HasCertificate
          - !Sub cdn.${DomainName}
          - !GetAtt MediaDistribution.DomainName
        SES_FROM_EMAIL: !Sub noreply@${DomainName}
        STAGE: !Ref Environment
        FRONTEND_URL: !If
          - IsProd
          - !Sub https://${DomainName}
          - !Ref FrontendUrl
        SECRETS_PREFIX: /eventalbum/secrets
        RECURRENTE_SSM_PREFIX: !Sub /eventalbum/${Environment}/secrets
        WS_ENDPOINT: !Sub https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  CertificateArn:
    Type: String
    Default: ''
    Description: ACM certificate ARN (us-east-1) for custom domains
  CloudFrontKeyPairId:
    Type: String
    Default: ''
    Description: CloudFront key pair ID for signed URLs
  DomainName:
    Type: String
    Default: snapnshare.app
    Description: Base domain name
  HostedZoneId:
    Type: String
    Default: Z08237523CHVVUQR4Z667
    Description: Route53 hosted zone ID for snapnshare.app
  FrontendUrl:
    Type: String
    Default: ''
    Description: Frontend URL for staging (set after first deploy with CloudFront domain)

Conditions:
  IsProd: !Equals [!Ref Environment, prod]
  IsNotProd: !Not [!Equals [!Ref Environment, prod]]
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]

Resources:

  # === LAYERS ===
  SharedUtilsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub EventAlbum-shared-${Environment}
      ContentUri: backend/shared/
      CompatibleRuntimes: [nodejs22.x]
      CompatibleArchitectures: [arm64]
    Metadata:
      BuildMethod: nodejs22.x

  # === API ===
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins:
          - !Sub https://${DomainName}
          - http://localhost:5173
          - "*"
        AllowMethods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Authorization
          - Content-Type
          - X-Confirm-Delete
          - X-Request-Id
        MaxAge: 600
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","method":"$context.httpMethod","path":"$context.path","status":"$context.status","latency":"$context.responseLatency"}'

  # =============================
  # PUBLIC ENDPOINTS (No Auth)
  # =============================

  CreateEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-createEvent
      CodeUri: backend/functions/createEvent/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/config/*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/features/*
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, sesv2:SendEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*

  AuthEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-authEvent
      CodeUri: backend/functions/authEvent/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/auth
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  HostLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-hostLogin
      CodeUri: backend/functions/hostLogin/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /auth/host/login
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - Statement:
            - Effect: Allow
              Action: dynamodb:Query
              Resource: !Sub ${EventAlbumTable.Arn}/index/GSI1
            - Effect: Allow
              Action: [ses:SendEmail, sesv2:SendEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*

  HostVerifyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-hostVerify
      CodeUri: backend/functions/hostVerify/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /auth/host/verify
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - Statement:
            - Effect: Allow
              Action: dynamodb:Query
              Resource: !Sub ${EventAlbumTable.Arn}/index/GSI1
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  GetConfigFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-getConfig
      CodeUri: backend/functions/getConfig/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /config
            Method: GET
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/config/*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/features/*

  ValidatePromoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-validatePromo
      CodeUri: backend/functions/validatePromo/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/promo
            Method: POST
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/config/*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/features/*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/discounts

  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-handleWebhook
      CodeUri: backend/functions/handleWebhook/
      Handler: index.handler
      Timeout: 15
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /webhooks/recurrente
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: !Sub eventalbum/${Environment}/secrets/recurrente-*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/config/*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/features/*
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, sesv2:SendEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*

  # =============================
  # AUTHENTICATED ENDPOINTS
  # =============================

  GetEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-getEvent
      CodeUri: backend/functions/getEvent/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - Statement:
            - Effect: Allow
              Action: dynamodb:UpdateItem
              Resource: !GetAtt EventAlbumTable.Arn
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/cf-*

  UpdateEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-updateEvent
      CodeUri: backend/functions/updateEvent/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}
            Method: PATCH
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  DeleteEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-deleteEvent
      CodeUri: backend/functions/deleteEvent/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}
            Method: DELETE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - S3CrudPolicy:
            BucketName: !Sub eventalbum-media-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  UpdateSettingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-updateSettings
      CodeUri: backend/functions/updateSettings/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/settings
            Method: PATCH
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/config/tiers/*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  # =============================
  # MEDIA ENDPOINTS
  # =============================

  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-getUploadUrl
      CodeUri: backend/functions/getUploadUrl/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/upload-url
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - S3CrudPolicy:
            BucketName: !Sub eventalbum-media-${Environment}
        - Statement:
            - Effect: Allow
              Action: s3:PutObjectTagging
              Resource: !Sub arn:aws:s3:::eventalbum-media-${Environment}/*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/config/*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/features/*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  ProcessUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-processUpload
      CodeUri: backend/functions/processUpload/
      Handler: index.handler
      MemorySize: 512
      Timeout: 60
      Events:
        S3Event:
          Type: S3
          Properties:
            Bucket: !Ref MediaBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: events/
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub eventalbum-media-${Environment}
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/config/tiers/*
        - Statement:
            - Effect: Allow
              Action: rekognition:DetectModerationLabels
              Resource: "*"
            - Effect: Allow
              Action: [ses:SendEmail, sesv2:SendEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/${Environment}/*

  ListMediaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-listMedia
      CodeUri: backend/functions/listMedia/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/cf-*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  DeleteMediaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-deleteMedia
      CodeUri: backend/functions/deleteMedia/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media/{mediaId}
            Method: DELETE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - S3CrudPolicy:
            BucketName: !Sub eventalbum-media-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  BulkDeleteMediaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-bulkDeleteMedia
      CodeUri: backend/functions/bulkDeleteMedia/
      Handler: index.handler
      Timeout: 30
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media/bulk-delete
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - S3CrudPolicy:
            BucketName: !Sub eventalbum-media-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  ClearAllMediaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-clearAllMedia
      CodeUri: backend/functions/clearAllMedia/
      Handler: index.handler
      Timeout: 60
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media
            Method: DELETE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - S3CrudPolicy:
            BucketName: !Sub eventalbum-media-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  SearchMediaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-searchMedia
      CodeUri: backend/functions/searchMedia/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media/search
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  ReportMediaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-reportMedia
      CodeUri: backend/functions/reportMedia/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media/{mediaId}/report
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, sesv2:SendEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*

  ModerateMediaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-moderateMedia
      CodeUri: backend/functions/moderateMedia/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media/{mediaId}/moderate
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - S3CrudPolicy:
            BucketName: !Sub eventalbum-media-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  # =============================
  # REACTIONS & COMMENTS
  # =============================

  AddReactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-addReaction
      CodeUri: backend/functions/addReaction/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media/{mediaId}/reactions
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/${Environment}/*

  AddCommentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-addComment
      CodeUri: backend/functions/addComment/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media/{mediaId}/comments
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/${Environment}/*

  ListCommentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-listComments
      CodeUri: backend/functions/listComments/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media/{mediaId}/comments
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  # =============================
  # OTP
  # =============================

  SendOtpFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-sendOtp
      CodeUri: backend/functions/sendOtp/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/otp/send
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret
        - Statement:
            - Effect: Allow
              Action: sns:Publish
              Resource: "*"
              Condition:
                StringEquals:
                  sns:Protocol: sms
            - Effect: Allow
              Action: [ses:SendEmail, sesv2:SendEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*

  VerifyOtpFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-verifyOtp
      CodeUri: backend/functions/verifyOtp/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/otp/verify
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  # =============================
  # HOST DASHBOARD
  # =============================

  GetStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-getStats
      CodeUri: backend/functions/getStats/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/stats
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  GetActivityFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-getActivity
      CodeUri: backend/functions/getActivity/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/activity
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  GetQrStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-getQrStats
      CodeUri: backend/functions/getQrStats/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/qr-stats
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  GetStorageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-getStorage
      CodeUri: backend/functions/getStorage/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/storage
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/config/*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/features/*

  # =============================
  # PAYMENTS
  # =============================

  CreateCheckoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-createCheckout
      CodeUri: backend/functions/createCheckout/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/checkout
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: !Sub eventalbum/${Environment}/secrets/recurrente-*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/config/*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/features/*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  VerifyPaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-verifyPayment
      CodeUri: backend/functions/verifyPayment/
      Handler: index.handler
      Timeout: 15
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/verify-payment
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: !Sub eventalbum/${Environment}/secrets/recurrente-*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/config/*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/features/*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, sesv2:SendEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*

  # =============================
  # ZIP DOWNLOAD
  # =============================

  DownloadZipFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-downloadZip
      CodeUri: backend/functions/downloadZip/
      Handler: index.handler
      MemorySize: 512
      Timeout: 120
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/download-zip
            Method: POST
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - S3CrudPolicy:
            BucketName: !Sub eventalbum-media-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/cf-*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  # =============================
  # SCHEDULED (EventBridge)
  # =============================

  NotifyUploadsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-notifyUploads
      CodeUri: backend/functions/notifyUploads/
      Handler: index.handler
      Timeout: 60
      Events:
        Schedule:
          Type: ScheduleV2
          Properties:
            Name: !Sub EventAlbum-${Environment}-notifyUploads-schedule
            ScheduleExpression: rate(30 minutes)
            State: ENABLED
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - Statement:
            - Effect: Allow
              Action: dynamodb:Scan
              Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/EventAlbum-${Environment}
            - Effect: Allow
              Action: [ses:SendEmail, sesv2:SendEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*

  EventSummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-eventSummary
      CodeUri: backend/functions/eventSummary/
      Handler: index.handler
      Timeout: 60
      Events:
        Schedule:
          Type: ScheduleV2
          Properties:
            Name: !Sub EventAlbum-${Environment}-eventSummary-schedule
            ScheduleExpression: rate(1 day)
            State: ENABLED
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - Statement:
            - Effect: Allow
              Action: dynamodb:Scan
              Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/EventAlbum-${Environment}
            - Effect: Allow
              Action: [ses:SendEmail, sesv2:SendEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*

  CleanupExpiredFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-cleanupExpired
      CodeUri: backend/functions/cleanupExpired/
      Handler: index.handler
      Timeout: 120
      Events:
        Schedule:
          Type: ScheduleV2
          Properties:
            Name: !Sub EventAlbum-${Environment}-cleanupExpired-schedule
            ScheduleExpression: rate(1 day)
            State: ENABLED
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - S3CrudPolicy:
            BucketName: !Sub eventalbum-media-${Environment}

  # =============================
  # WEBSOCKET API
  # =============================

  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub EventAlbum-${Environment}-ws
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: $request.body.action

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: !Ref Environment
      AutoDeploy: true

  # --- $connect ---
  WsConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-wsConnect
      CodeUri: backend/functions/wsConnect/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  WsConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WsConnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*/$connect

  WsConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsConnectFunction.Arn}/invocations

  WsConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Sub integrations/${WsConnectIntegration}

  # --- $disconnect ---
  WsDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-wsDisconnect
      CodeUri: backend/functions/wsDisconnect/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub EventAlbum-${Environment}

  WsDisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WsDisconnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*/$disconnect

  WsDisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsDisconnectFunction.Arn}/invocations

  WsDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      Target: !Sub integrations/${WsDisconnectIntegration}

  # --- $default ---
  WsDefaultFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-wsDefault
      CodeUri: backend/functions/wsDefault/
      Handler: index.handler

  WsDefaultPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WsDefaultFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*/$default

  WsDefaultIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsDefaultFunction.Arn}/invocations

  WsDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $default
      Target: !Sub integrations/${WsDefaultIntegration}

  # =============================
  # DATABASE
  # =============================

  EventAlbumTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub EventAlbum-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expiresAtTTL
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [IsProd, true, false]

  # =============================
  # STORAGE
  # =============================

  MediaBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub eventalbum-media-${Environment}
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: !If
              - IsProd
              - - !Sub https://${DomainName}
                - http://localhost:5173
              - - "*"
            AllowedMethods: [PUT]
            AllowedHeaders: [Content-Type, Content-Length]
            ExposedHeaders: [ETag]
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: CleanupIncompleteUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
          - Id: CleanupExports
            Status: Enabled
            Prefix: exports/
            ExpirationInDays: 7

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub eventalbum-frontend-${Environment}
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # =============================
  # CDN — Media
  # =============================

  MediaDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub EventAlbum Media CDN - ${Environment}
        Aliases: !If
          - HasCertificate
          - [!Sub "cdn.${DomainName}"]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCertificate
          - AcmCertificateArn: !Ref CertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - !Ref AWS::NoValue
        DefaultCacheBehavior:
          TargetOriginId: MediaS3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
        Origins:
          - Id: MediaS3Origin
            DomainName: !Sub eventalbum-media-${Environment}.s3.${AWS::Region}.amazonaws.com
            OriginAccessControlId: !Ref MediaOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        HttpVersion: http2and3
        PriceClass: PriceClass_100

  MediaOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub EventAlbum-MediaOAC-${Environment}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  MediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Sub eventalbum-media-${Environment}
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${MediaBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${MediaDistribution}

  # =============================
  # CDN — Frontend
  # =============================

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub EventAlbum Frontend - ${Environment}
        DefaultRootObject: index.html
        Aliases: !If
          - HasCertificate
          - [!Sub "${DomainName}"]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCertificate
          - AcmCertificateArn: !Ref CertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - !Ref AWS::NoValue
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
        Origins:
          - Id: FrontendS3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref FrontendOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
        HttpVersion: http2and3
        PriceClass: PriceClass_100

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub EventAlbum-FrontendOAC-${Environment}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}

  # =============================
  # API CUSTOM DOMAIN (prod only)
  # =============================

  ApiDomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: HasCertificate
    Properties:
      DomainName: !Sub api.${DomainName}
      DomainNameConfigurations:
        - EndpointType: REGIONAL
          CertificateArn: !Ref CertificateArn

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: HasCertificate
    DependsOn:
      - ApiDomainName
      - HttpApiStage
    Properties:
      DomainName: !Sub api.${DomainName}
      ApiId: !Ref HttpApi
      Stage: !Ref Environment

  ApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasCertificate
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub api.${DomainName}
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiDomainName.RegionalDomainName
        HostedZoneId: !GetAtt ApiDomainName.RegionalHostedZoneId

  FrontendDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasCertificate
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt FrontendDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  MediaCdnDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasCertificate
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub cdn.${DomainName}
      Type: A
      AliasTarget:
        DNSName: !GetAtt MediaDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  # =============================
  # LOGGING
  # =============================

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/EventAlbum-${Environment}
      RetentionInDays: 30

Outputs:
  ApiUrl:
    Value: !If
      - HasCertificate
      - !Sub https://api.${DomainName}
      - !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
  MediaBucketName:
    Value: !Sub eventalbum-media-${Environment}
  FrontendBucketName:
    Value: !Ref FrontendBucket
  MediaDistributionDomain:
    Value: !GetAtt MediaDistribution.DomainName
  MediaDistributionId:
    Value: !Ref MediaDistribution
  FrontendDistributionDomain:
    Value: !GetAtt FrontendDistribution.DomainName
  FrontendDistributionId:
    Value: !Ref FrontendDistribution
  TableName:
    Value: !Sub EventAlbum-${Environment}
  WebSocketUrl:
    Value: !Sub wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
  FrontendUrl:
    Value: !If
      - HasCertificate
      - !Sub https://${DomainName}
      - !Sub https://${FrontendDistribution.DomainName}

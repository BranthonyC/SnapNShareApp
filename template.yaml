AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: EventAlbum - Serverless Event Media Platform

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures: [arm64]
    MemorySize: 128
    Timeout: 10
    Environment:
      Variables:
        TABLE_NAME: !Ref EventAlbumTable
        MEDIA_BUCKET: !Ref MediaBucket
        CLOUDFRONT_DOMAIN: !GetAtt MediaDistribution.DomainName
        SES_FROM_EMAIL: !Sub noreply@${DomainName}
        STAGE: !Ref Environment
        FRONTEND_URL: !If
          - IsProd
          - !Sub https://eventalbum.${DomainName}
          - !Sub https://eventalbum.${DomainName}

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  CertificateArn:
    Type: String
    Default: ''
    Description: ACM certificate ARN (us-east-1) for custom domains
  CloudFrontKeyPairId:
    Type: String
    Default: ''
    Description: CloudFront key pair ID for signed URLs
  DomainName:
    Type: String
    Default: codersatelier.com
    Description: Base domain name
  HostedZoneId:
    Type: String
    Default: Z08603501B1REIW4K7888
    Description: Route53 hosted zone ID for codersatelier.com

Conditions:
  IsProd: !Equals [!Ref Environment, prod]
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]

Resources:

  # === LAYERS ===
  SharedUtilsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub EventAlbum-shared-${Environment}
      ContentUri: backend/shared/
      CompatibleRuntimes: [nodejs22.x]
      CompatibleArchitectures: [arm64]
    Metadata:
      BuildMethod: nodejs22.x

  # === API ===
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins:
          - !Sub https://eventalbum.${DomainName}
          - http://localhost:5173
        AllowMethods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Authorization
          - Content-Type
          - X-Confirm-Delete
          - X-Request-Id
        MaxAge: 600
      ThrottlingBurstLimit: 100
      ThrottlingRateLimit: 50
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn

  # =============================
  # PUBLIC ENDPOINTS (No Auth)
  # =============================

  CreateEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-createEvent
      CodeUri: backend/functions/createEvent/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/config/*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/features/*
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, sesv2:SendEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${DomainName}

  AuthEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-authEvent
      CodeUri: backend/functions/authEvent/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/auth
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  HostLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-hostLogin
      CodeUri: backend/functions/hostLogin/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /auth/host/login
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - Statement:
            - Effect: Allow
              Action: dynamodb:Query
              Resource: !Sub ${EventAlbumTable.Arn}/index/GSI1
            - Effect: Allow
              Action: [ses:SendEmail, sesv2:SendEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${DomainName}

  HostVerifyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-hostVerify
      CodeUri: backend/functions/hostVerify/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /auth/host/verify
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - Statement:
            - Effect: Allow
              Action: dynamodb:Query
              Resource: !Sub ${EventAlbumTable.Arn}/index/GSI1
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  GetConfigFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-getConfig
      CodeUri: backend/functions/getConfig/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /config
            Method: GET
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/config/*

  ValidatePromoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-validatePromo
      CodeUri: backend/functions/validatePromo/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/promo
            Method: POST
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/config/discounts

  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-handleWebhook
      CodeUri: backend/functions/handleWebhook/
      Handler: index.handler
      Timeout: 15
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /webhooks/recurrente
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/recurrente-*
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, sesv2:SendEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${DomainName}

  # =============================
  # AUTHENTICATED ENDPOINTS
  # =============================

  GetEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-getEvent
      CodeUri: backend/functions/getEvent/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/cf-*

  UpdateEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-updateEvent
      CodeUri: backend/functions/updateEvent/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}
            Method: PATCH
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  DeleteEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-deleteEvent
      CodeUri: backend/functions/deleteEvent/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}
            Method: DELETE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  UpdateSettingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-updateSettings
      CodeUri: backend/functions/updateSettings/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/settings
            Method: PATCH
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/config/tiers/*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  # =============================
  # MEDIA ENDPOINTS
  # =============================

  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-getUploadUrl
      CodeUri: backend/functions/getUploadUrl/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/upload-url
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/config/tiers/*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  ProcessUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-processUpload
      CodeUri: backend/functions/processUpload/
      Handler: index.handler
      MemorySize: 512
      Timeout: 60
      Events:
        S3Event:
          Type: S3
          Properties:
            Bucket: !Ref MediaBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: events/
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/config/tiers/*
        - Statement:
            - Effect: Allow
              Action: rekognition:DetectModerationLabels
              Resource: "*"
            - Effect: Allow
              Action: [ses:SendEmail, sesv2:SendEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${DomainName}

  ListMediaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-listMedia
      CodeUri: backend/functions/listMedia/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/cf-*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  DeleteMediaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-deleteMedia
      CodeUri: backend/functions/deleteMedia/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media/{mediaId}
            Method: DELETE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  BulkDeleteMediaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-bulkDeleteMedia
      CodeUri: backend/functions/bulkDeleteMedia/
      Handler: index.handler
      Timeout: 30
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media/bulk-delete
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  ClearAllMediaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-clearAllMedia
      CodeUri: backend/functions/clearAllMedia/
      Handler: index.handler
      Timeout: 60
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media
            Method: DELETE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  SearchMediaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-searchMedia
      CodeUri: backend/functions/searchMedia/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media/search
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  ReportMediaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-reportMedia
      CodeUri: backend/functions/reportMedia/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media/{mediaId}/report
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, sesv2:SendEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${DomainName}

  ModerateMediaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-moderateMedia
      CodeUri: backend/functions/moderateMedia/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media/{mediaId}/moderate
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  # =============================
  # REACTIONS & COMMENTS
  # =============================

  AddReactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-addReaction
      CodeUri: backend/functions/addReaction/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media/{mediaId}/reactions
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  AddCommentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-addComment
      CodeUri: backend/functions/addComment/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media/{mediaId}/comments
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  ListCommentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-listComments
      CodeUri: backend/functions/listComments/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/media/{mediaId}/comments
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  # =============================
  # OTP
  # =============================

  SendOtpFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-sendOtp
      CodeUri: backend/functions/sendOtp/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/otp/send
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret
        - Statement:
            - Effect: Allow
              Action: sns:Publish
              Resource: "*"
              Condition:
                StringEquals:
                  sns:Protocol: sms
            - Effect: Allow
              Action: [ses:SendEmail, sesv2:SendEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${DomainName}

  VerifyOtpFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-verifyOtp
      CodeUri: backend/functions/verifyOtp/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/otp/verify
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  # =============================
  # HOST DASHBOARD
  # =============================

  GetStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-getStats
      CodeUri: backend/functions/getStats/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/stats
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  GetActivityFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-getActivity
      CodeUri: backend/functions/getActivity/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/activity
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  GetQrStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-getQrStats
      CodeUri: backend/functions/getQrStats/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/qr-stats
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  GetStorageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-getStorage
      CodeUri: backend/functions/getStorage/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/storage
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  # =============================
  # PAYMENTS
  # =============================

  CreateCheckoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-createCheckout
      CodeUri: backend/functions/createCheckout/
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/checkout
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/recurrente-*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/config/pricing
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/config/discounts
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  # =============================
  # ZIP DOWNLOAD
  # =============================

  DownloadZipFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-downloadZip
      CodeUri: backend/functions/downloadZip/
      Handler: index.handler
      MemorySize: 512
      Timeout: 120
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /events/{eventId}/download-zip
            Method: POST
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventAlbumTable
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/cf-*
        - SSMParameterReadPolicy:
            ParameterName: eventalbum/secrets/jwt-secret

  # =============================
  # SCHEDULED (EventBridge)
  # =============================

  NotifyUploadsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-notifyUploads
      CodeUri: backend/functions/notifyUploads/
      Handler: index.handler
      Timeout: 60
      Events:
        Schedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: rate(30 minutes)
            State: ENABLED
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - Statement:
            - Effect: Allow
              Action: dynamodb:Scan
              Resource: !GetAtt EventAlbumTable.Arn
            - Effect: Allow
              Action: [ses:SendEmail, sesv2:SendEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${DomainName}

  EventSummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-eventSummary
      CodeUri: backend/functions/eventSummary/
      Handler: index.handler
      Timeout: 60
      Events:
        Schedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: rate(1 day)
            State: ENABLED
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - Statement:
            - Effect: Allow
              Action: dynamodb:Scan
              Resource: !GetAtt EventAlbumTable.Arn
            - Effect: Allow
              Action: [ses:SendEmail, sesv2:SendEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${DomainName}

  CleanupExpiredFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub EventAlbum-${Environment}-cleanupExpired
      CodeUri: backend/functions/cleanupExpired/
      Handler: index.handler
      Timeout: 120
      Events:
        Schedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: rate(1 day)
            State: ENABLED
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventAlbumTable
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket

  # =============================
  # DATABASE
  # =============================

  EventAlbumTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub EventAlbum-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expiresAtTTL
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [IsProd, true, false]

  # =============================
  # STORAGE
  # =============================

  MediaBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub eventalbum-media-${Environment}
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !Sub https://eventalbum.${DomainName}
              - http://localhost:5173
            AllowedMethods: [PUT]
            AllowedHeaders: [Content-Type]
            ExposeHeaders: [ETag]
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: CleanupIncompleteUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
          - Id: CleanupExports
            Status: Enabled
            Prefix: exports/
            ExpirationInDays: 7

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub eventalbum-frontend-${Environment}
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # =============================
  # CDN — Media
  # =============================

  MediaDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub EventAlbum Media CDN - ${Environment}
        Aliases: !If
          - HasCertificate
          - [!Sub "cdn.eventalbum.${DomainName}"]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCertificate
          - AcmCertificateArn: !Ref CertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - !Ref AWS::NoValue
        DefaultCacheBehavior:
          TargetOriginId: MediaS3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
        Origins:
          - Id: MediaS3Origin
            DomainName: !GetAtt MediaBucket.RegionalDomainName
            OriginAccessControlId: !Ref MediaOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        HttpVersion: http2and3
        PriceClass: PriceClass_100

  MediaOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub EventAlbum-MediaOAC-${Environment}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  MediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MediaBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${MediaBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${MediaDistribution}

  # =============================
  # CDN — Frontend
  # =============================

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub EventAlbum Frontend - ${Environment}
        DefaultRootObject: index.html
        Aliases: !If
          - HasCertificate
          - [!Sub "eventalbum.${DomainName}"]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCertificate
          - AcmCertificateArn: !Ref CertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - !Ref AWS::NoValue
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
        Origins:
          - Id: FrontendS3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref FrontendOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
        HttpVersion: http2and3
        PriceClass: PriceClass_100

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub EventAlbum-FrontendOAC-${Environment}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}

  # =============================
  # LOGGING
  # =============================

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/EventAlbum-${Environment}
      RetentionInDays: 30

Outputs:
  ApiUrl:
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
  MediaBucketName:
    Value: !Ref MediaBucket
  FrontendBucketName:
    Value: !Ref FrontendBucket
  MediaDistributionDomain:
    Value: !GetAtt MediaDistribution.DomainName
  MediaDistributionId:
    Value: !Ref MediaDistribution
  FrontendDistributionDomain:
    Value: !GetAtt FrontendDistribution.DomainName
  FrontendDistributionId:
    Value: !Ref FrontendDistribution
  TableName:
    Value: !Ref EventAlbumTable
  FrontendUrl:
    Value: !If
      - HasCertificate
      - !Sub https://eventalbum.${DomainName}
      - !Sub https://${FrontendDistribution.DomainName}
